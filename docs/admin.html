<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin — Linh Thú</title>
<style>
  :root { --bg:#f4f7fb; --card:#fff; --line:#e4e9f2; --ink:#1f2a44; --mut:#6b7790; --pri:#3b6cff; --bad:#d92d4b; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:15px/1.5 "Segoe UI",system-ui,sans-serif; }
  .wrap { max-width:1040px; margin:0 auto; padding:24px 16px 64px; }
  h1 { font-size:22px; margin:0 0 16px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px; box-shadow:0 1px 3px rgba(20,40,90,.05); }
  /* đăng nhập */
  #loginView { max-width:380px; margin:48px auto; }
  #loginView input { width:100%; padding:11px 12px; margin:8px 0; border:1px solid var(--line); border-radius:10px; font-size:15px; }
  button { cursor:pointer; border:0; border-radius:10px; padding:10px 16px; font-size:15px; font-weight:600; }
  .btn-pri { background:var(--pri); color:#fff; }
  .btn-pri:hover { filter:brightness(.95); }
  .btn-ghost { background:#eef2fb; color:var(--ink); }
  .btn-ghost:hover { background:#e4eaf7; }
  .err { color:var(--bad); min-height:20px; margin:6px 0 0; font-size:14px; }
  /* bảng điều khiển */
  .bar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; }
  .bar .who { color:var(--mut); font-size:14px; }
  .row { display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-bottom:14px; }
  .row label { font-weight:600; }
  .row input { padding:9px 11px; border:1px solid var(--line); border-radius:10px; font-size:15px; min-width:240px; }
  .summary { color:var(--mut); margin:0 0 14px; }
  .summary b { color:var(--ink); }
  .chips { display:flex; flex-wrap:wrap; gap:8px; margin:8px 0 0; }
  .chip { background:#eef2fb; border-radius:999px; padding:4px 12px; font-size:14px; }
  table { width:100%; border-collapse:collapse; margin-top:6px; font-size:14px; }
  th, td { text-align:left; padding:9px 12px; border-bottom:1px solid var(--line); }
  th { color:var(--mut); font-weight:600; white-space:nowrap; background:#fafbfe; position:sticky; top:0; }
  tbody tr:hover { background:#fafbfe; }
  .num { color:var(--mut); width:46px; }
  [hidden] { display:none !important; }
</style>
</head>
<body>
<div class="wrap">

  <!-- ── A) CHƯA ĐĂNG NHẬP ───────────────────────────────────────────── -->
  <div id="loginView" hidden>
    <div class="card">
      <h1>Trang quản trị</h1>
      <form id="loginForm" autocomplete="on">
        <input id="email" type="email" placeholder="Email admin" autocomplete="username" required />
        <input id="password" type="password" placeholder="Mật khẩu" autocomplete="current-password" required />
        <button type="submit" class="btn-pri" style="width:100%;margin-top:6px;">Đăng nhập</button>
      </form>
      <p id="loginErr" class="err"></p>
    </div>
  </div>

  <!-- ── B) ĐÃ ĐĂNG NHẬP ─────────────────────────────────────────────── -->
  <div id="adminView" hidden>
    <div class="bar">
      <h1 style="margin:0;">Danh sách đăng ký</h1>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="who" id="who"></span>
        <button id="btnLogout" class="btn-ghost">Đăng xuất</button>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <label for="eventId">Sự kiện (EVENT_ID):</label>
        <input id="eventId" spellcheck="false" />
        <button id="btnLoad" class="btn-ghost">Tải dữ liệu</button>
        <button id="btnExcel" class="btn-pri">⬇ Tải Excel</button>
      </div>
      <p id="loadErr" class="err"></p>
      <p id="summary" class="summary"></p>
      <div id="chips" class="chips"></div>
      <div style="overflow:auto;max-height:64vh;margin-top:12px;">
        <table id="tbl">
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- Firebase compat (app + firestore + AUTH) + SheetJS, qua CDN — KHÔNG cần build -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

<!-- Tái dùng cấu hình chung của app (FIELDS, EVENT_ID, ICONS, FIREBASE_CONFIG, db).
     KHÔNG nạp storage/api/ui/app của luồng index — trang admin đứng riêng. -->
<script src="js/config.js"></script>
<script src="js/firebase-config.js"></script>

<script>
// ── Logic admin (inline, đứng riêng) ──────────────────────────────────────
// Bảo mật: trang này CHỈ đăng nhập rồi THỬ đọc signups. Cho/chặn đọc nằm ở
// Security Rules phía server (allow read theo UID admin). UID không có trong
// rules → Firestore trả "permission-denied" → không lộ PII.
(function () {
  const $ = id => document.getElementById(id);
  const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

  if (!window.firebase || typeof FIREBASE_ON === "undefined" || !FIREBASE_ON || !db) {
    document.body.innerHTML = "<div class='wrap'><div class='card'>Chưa cấu hình Firebase trong <b>docs/js/firebase-config.js</b> — trang admin cần chế độ firebase.</div></div>";
    return;
  }

  const auth    = firebase.auth();
  const byEmoji = {};
  (typeof ICONS !== "undefined" ? ICONS : []).forEach(g => { byEmoji[g.icon] = g; });
  const teamName  = icon => (byEmoji[icon] && byEmoji[icon].name) || icon || "—";
  const teamLabel = icon => (icon ? icon + " " : "") + teamName(icon);
  const fmtTime   = at => { try { return at && at.toDate ? at.toDate().toLocaleString("vi-VN") : ""; } catch (e) { return ""; } };

  let currentRows = [];   // dữ liệu signups đã tải (cho cả bảng lẫn Excel)
  let currentEid  = "";

  // ── Đăng nhập / đăng xuất (Firebase Authentication thật) ──
  auth.onAuthStateChanged(user => {
    if (user) {
      $("loginView").hidden = true;
      $("adminView").hidden = false;
      $("who").textContent = "Đăng nhập: " + (user.email || user.uid);
      if (!$("eventId").value) $("eventId").value = (typeof EVENT_ID !== "undefined" ? EVENT_ID : "");
      load($("eventId").value.trim());   // tự tải sự kiện hiện tại
    } else {
      $("adminView").hidden = true;
      $("loginView").hidden = false;
      currentRows = []; currentEid = "";
      $("password").value = "";
    }
  });

  $("loginForm").addEventListener("submit", async e => {
    e.preventDefault();
    $("loginErr").textContent = "";
    try {
      await auth.signInWithEmailAndPassword($("email").value.trim(), $("password").value);
    } catch (err) {
      $("loginErr").textContent = authError(err);
    }
  });

  $("btnLogout").addEventListener("click", () => auth.signOut());

  function authError(err) {
    const code = (err && err.code) || "";
    if (code === "auth/invalid-email")          return "Email không hợp lệ.";
    if (code === "auth/user-disabled")          return "Tài khoản đã bị khoá.";
    if (code === "auth/too-many-requests")      return "Thử quá nhiều lần — đợi một lát rồi thử lại.";
    if (code === "auth/network-request-failed") return "Lỗi mạng — kiểm tra kết nối.";
    if (code === "auth/user-not-found" || code === "auth/wrong-password" || code === "auth/invalid-credential")
      return "Sai email hoặc mật khẩu.";
    return "Đăng nhập thất bại: " + (err.message || code);
  }

  // ── Tải & hiển thị ──
  $("btnLoad").addEventListener("click", () => load($("eventId").value.trim()));
  $("btnExcel").addEventListener("click", exportExcel);

  async function load(eid) {
    $("loadErr").textContent = "";
    if (!eid) { $("loadErr").textContent = "Hãy nhập EVENT_ID."; return; }
    try {
      const snap = await db.collection("events").doc(eid).collection("signups").get();
      currentRows = snap.docs.map(d => d.data());
      currentEid  = eid;
      // sắp xếp: theo đội rồi theo thời gian đăng ký
      currentRows.sort((a, b) => {
        const ta = teamName(a.icon), tb = teamName(b.icon);
        if (ta !== tb) return ta.localeCompare(tb, "vi");
        const sa = a.at && a.at.seconds || 0, sb = b.at && b.at.seconds || 0;
        return sa - sb;
      });
      renderTable();
      renderSummary();
    } catch (err) {
      currentRows = [];
      renderTable(); renderSummary();
      const msg = String(err && (err.code || err.message) || err);
      $("loadErr").textContent = /permission|insufficient/i.test(msg)
        ? "Tài khoản này chưa có quyền xem. Dán UID của nó vào mảng admin trong firestore.rules rồi Publish lại."
        : "Lỗi tải dữ liệu: " + msg;
    }
  }

  function renderTable() {
    const fields = (typeof FIELDS !== "undefined" ? FIELDS : []);
    $("thead").innerHTML = "<tr><th class='num'>#</th><th>Đội</th>"
      + fields.map(f => "<th>" + esc(f.label) + "</th>").join("")
      + "<th>Thời gian</th></tr>";
    $("tbody").innerHTML = currentRows.map((r, i) =>
      "<tr><td class='num'>" + (i + 1) + "</td>"
      + "<td>" + esc(teamLabel(r.icon)) + "</td>"
      + fields.map(f => "<td>" + esc(r[f.key]) + "</td>").join("")
      + "<td>" + esc(fmtTime(r.at)) + "</td></tr>"
    ).join("");
  }

  function renderSummary() {
    const n = currentRows.length;
    const per = {};
    currentRows.forEach(r => { per[r.icon] = (per[r.icon] || 0) + 1; });
    $("summary").innerHTML = "Tổng số người đăng ký: <b>" + n + "</b>"
      + (currentEid ? " — sự kiện <b>" + esc(currentEid) + "</b>" : "");
    $("chips").innerHTML = Object.keys(per)
      .sort((a, b) => per[b] - per[a])
      .map(ic => "<span class='chip'>" + esc(teamLabel(ic)) + ": <b>" + per[ic] + "</b></span>")
      .join("");
  }

  // ── Xuất Excel bằng SheetJS → {EVENT_ID}.xlsx ──
  function exportExcel() {
    if (!currentRows.length) { $("loadErr").textContent = "Chưa có dữ liệu để xuất."; return; }
    const fields  = (typeof FIELDS !== "undefined" ? FIELDS : []);
    const headers = ["STT", "Đội"].concat(fields.map(f => f.label)).concat(["Thời gian"]);
    const data = currentRows.map((r, i) => {
      const o = { "STT": i + 1, "Đội": teamLabel(r.icon) };
      fields.forEach(f => { o[f.label] = (r[f.key] == null ? "" : String(r[f.key])); });
      o["Thời gian"] = fmtTime(r.at);
      return o;
    });
    const ws = XLSX.utils.json_to_sheet(data, { header: headers });
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "signups");
    XLSX.writeFile(wb, (currentEid || "signups") + ".xlsx");
  }
})();
</script>
</body>
</html>
