<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Linh Thú Của Bạn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* ── Soft Cloud Candy palette ── */
  --bg:#FBF7FF; --surface:#FFFFFF;
  --card:rgba(255,255,255,.80); --card-alt:rgba(255,255,255,.56);
  --text:#4A4063; --muted:#6F6690; --muted-2:#A79FC0;
  --line:rgba(124,115,150,.14); --err:#FF6B8A; --accent:#A98CFF;
  --display:'Fredoka','Baloo 2',system-ui,sans-serif;
  --body:'Nunito','Quicksand',system-ui,sans-serif;
  /* radii */
  --r-sm:12px; --r-md:18px; --r-lg:26px; --r-xl:34px; --pill:999px;
  /* soft diffuse shadows (never hard offsets) */
  --sh-soft:0 6px 18px -10px rgba(124,115,150,.30), 0 2px 6px -2px rgba(124,115,150,.16);
  --sh-card:0 18px 44px -22px rgba(124,115,150,.40), 0 4px 12px -6px rgba(124,115,150,.16), inset 0 1px 0 rgba(255,255,255,.85);
  --sh-pop:0 26px 60px -24px rgba(169,140,255,.55), 0 10px 24px -12px rgba(255,138,182,.35);
  --candy:linear-gradient(135deg,#C9B4FF 0%,#A98CFF 55%,#FFB3D1 120%);
  --bounce:cubic-bezier(.34,1.56,.64,1);
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{font-family:var(--body);color:var(--text);background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden;font-weight:500}
body::before{content:"";position:fixed;inset:0;z-index:-1;background:
  radial-gradient(820px 520px at 8% -10%, #FFE6F0 0%, transparent 58%),
  radial-gradient(760px 560px at 100% 0%, #DDEBFF 0%, transparent 55%),
  radial-gradient(720px 680px at 50% 118%, #D7F5E6 0%, transparent 60%),
  radial-gradient(600px 480px at 92% 92%, #FFF1D6 0%, transparent 62%),
  var(--bg)}
.wrap{max-width:1020px;margin:0 auto;padding:46px 22px 96px}

/* header */
h1{font-family:var(--display);font-weight:700;letter-spacing:-.01em;line-height:1.02;font-size:clamp(40px,8vw,72px);margin:0;
  background:linear-gradient(92deg,#FF7AC0 0%,#A98CFF 52%,#7DD3FC 100%);-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 6px 14px rgba(169,140,255,.18))}
.sub{color:var(--muted);font-size:16.5px;margin-top:14px;max-width:660px;line-height:1.6;font-weight:600}
.sub b{color:var(--text);font-weight:800}

/* profile summary bar */
.profile:empty{display:none}
.profile{margin-top:26px}
.summary{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 18px;border:1.5px solid var(--line);border-radius:var(--r-lg);background:var(--card);box-shadow:var(--sh-soft);backdrop-filter:blur(8px)}
.ava{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;font-family:var(--display);font-weight:600;font-size:19px;color:#fff;background:var(--accent);flex:0 0 auto;box-shadow:0 8px 18px -10px rgba(124,115,150,.5)}
.s-txt{display:flex;flex-direction:column;line-height:1.3;min-width:0}
.s-txt .nm{font-family:var(--display);font-weight:600;font-size:16.5px;color:var(--text)}
.s-txt .meta{font-size:13px;color:var(--muted-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60vw;font-weight:700}
.s-spacer{flex:1}
.linkbtn{background:none;border:0;color:var(--muted);font-family:var(--body);font-weight:700;font-size:13px;cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:6px 4px}
.linkbtn:hover{color:var(--accent)}

/* banner đội của bạn */
.banner{margin-top:20px;border-radius:var(--r-lg);padding:18px 20px;display:flex;align-items:center;gap:16px;
  border:1.5px solid color-mix(in srgb,var(--c) 40%,transparent);
  background:linear-gradient(120deg,color-mix(in srgb,var(--c) 18%,#fff),#fff);box-shadow:var(--sh-soft)}
.banner .bi{font-size:38px;filter:drop-shadow(0 6px 10px color-mix(in srgb,var(--c) 40%,transparent))}
.banner .bt{font-family:var(--display);font-weight:600;font-size:19px;color:var(--text)}
.banner .bs{color:var(--muted);font-size:13.5px;font-weight:600}

/* section header */
.section-h{display:flex;align-items:baseline;gap:12px;margin:36px 0 18px}
.section-h h2{font-family:var(--display);font-weight:600;font-size:22px;margin:0;letter-spacing:-.01em;color:var(--text)}
.section-h .count{font-size:13px;color:var(--muted-2);font-weight:800}
.hr{height:2px;background:var(--line);flex:1;border-radius:2px}

/* grid đội còn chỗ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:16px}
.tile{position:relative;border:1.5px solid var(--line);border-radius:var(--r-lg);padding:22px 16px 16px;text-align:center;overflow:hidden;
  background:linear-gradient(180deg,color-mix(in srgb,var(--c) 14%,#fff) 0%,#fff 70%);
  box-shadow:0 14px 34px -20px rgba(124,115,150,.38),inset 0 1px 0 rgba(255,255,255,.9);
  transition:transform .3s var(--bounce),box-shadow .25s ease,border-color .25s ease,opacity .35s ease;
  animation:rise .5s var(--bounce) both}
.tile::before{content:"";position:absolute;inset:0;border-radius:var(--r-lg);background:radial-gradient(130px 100px at 50% -8%, var(--c), transparent 70%);opacity:.22;pointer-events:none;transition:opacity .25s}
.tile .ic{font-size:clamp(42px,8vw,52px);line-height:1;filter:drop-shadow(0 6px 10px color-mix(in srgb,var(--c) 40%,transparent))}
.tile .nm{font-family:var(--display);font-weight:600;font-size:16px;margin-top:8px;color:var(--text)}
.tile.sel{cursor:pointer}
.tile.sel:hover{transform:translateY(-6px) scale(1.04);border-color:color-mix(in srgb,var(--c) 55%,transparent);box-shadow:0 24px 46px -22px color-mix(in srgb,var(--c) 70%,rgba(124,115,150,.5))}
.tile.sel:hover::before{opacity:.42}
.tile.sel:hover .ic{animation:wobble .6s var(--bounce)}
.tile.sel:active{transform:translateY(-2px) scale(1)}
.tile.disabled{opacity:.62;filter:saturate(.85);cursor:not-allowed}
.tile.mine{border-color:color-mix(in srgb,var(--c) 55%,transparent);box-shadow:0 0 0 2px color-mix(in srgb,var(--c) 30%,transparent) inset,var(--sh-soft);opacity:1;filter:none}

/* sĩ số + thanh tiến trình + avatar thành viên */
.tile .cap{font-family:var(--display);font-weight:600;font-size:13px;color:var(--muted);margin-top:7px}
.cap-bar{height:7px;border-radius:var(--pill);background:rgba(124,115,150,.16);margin:8px 6px 0;overflow:hidden}
.cap-bar span{display:block;height:100%;border-radius:var(--pill);background:linear-gradient(90deg,color-mix(in srgb,var(--c) 70%,#fff),var(--c));transition:width .45s var(--bounce)}
.avas{display:flex;justify-content:center;align-items:center;gap:5px;margin-top:12px;flex-wrap:wrap;min-height:26px}
.mini{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-family:var(--display);font-weight:600;font-size:12px;color:#fff;
  background:linear-gradient(135deg,color-mix(in srgb,var(--c) 65%,#fff),var(--c));box-shadow:0 4px 9px -4px color-mix(in srgb,var(--c) 60%,transparent)}
.mini.more{background:#EDE7FA;color:var(--muted)}
.mini.empty{background:transparent;color:var(--muted-2);box-shadow:none;font-size:18px}

.pick{margin-top:14px;width:100%;border:0;border-radius:16px;padding:11px;font-family:var(--display);font-weight:600;font-size:14.5px;color:#fff;cursor:pointer;
  background:linear-gradient(135deg,color-mix(in srgb,var(--c) 75%,#fff),var(--c));
  box-shadow:0 10px 22px -10px color-mix(in srgb,var(--c) 65%,transparent),inset 0 1px 0 rgba(255,255,255,.5);
  transition:transform .25s var(--bounce),filter .2s}
.pick:hover{filter:brightness(1.05)}
.pick:active{transform:scale(.96)}
.pick.lock{background:#EFEAF8;color:var(--muted-2);box-shadow:none;cursor:not-allowed}

/* đội đã đủ */
.taken-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(244px,1fr));gap:16px}
.full-team{border:1.5px solid var(--line);border-radius:var(--r-lg);padding:16px 18px 14px;background:var(--card);box-shadow:var(--sh-soft);backdrop-filter:blur(8px);animation:rise .5s var(--bounce) both}
.full-team.mine{border-color:color-mix(in srgb,var(--c) 55%,transparent);box-shadow:0 0 0 2px color-mix(in srgb,var(--c) 28%,transparent) inset,var(--sh-soft)}
.ft-head{display:flex;align-items:center;gap:12px;margin-bottom:13px}
.ft-head .ti{font-size:34px;filter:drop-shadow(0 4px 8px color-mix(in srgb,var(--c) 35%,transparent))}
.ft-meta{min-width:0;line-height:1.2}
.ft-meta .lab{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);font-weight:800}
.ft-meta .ft-name{font-family:var(--display);font-weight:600;font-size:17px;color:var(--text)}
.ft-badge{margin-left:auto;font-size:11px;color:#fff;background:var(--c);padding:5px 11px;border-radius:var(--pill);font-weight:800;font-family:var(--body);white-space:nowrap}
.ft-list{list-style:none;margin:0;padding:0;display:grid;gap:6px}
.ft-list li{display:flex;align-items:center;gap:9px;font-weight:700;font-size:13.5px;color:var(--text);min-width:0}
.ft-list li>:last-child,.ft-list li{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ft-list .no{flex:0 0 auto;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--muted);background:rgba(124,115,150,.12);font-family:var(--body)}

/* empty / hint */
.empty-note{color:var(--muted);font-weight:600;font-size:14px;padding:26px 20px;border:2px dashed rgba(169,140,255,.32);border-radius:var(--r-lg);text-align:center;background:rgba(255,255,255,.55);line-height:1.55}
.empty-note::before{content:"🫧";display:block;font-size:34px;opacity:.75;margin-bottom:8px}
.hint{color:var(--muted);font-weight:700;font-size:13px;background:rgba(221,235,255,.6);border-radius:14px;padding:10px 14px;margin:-4px 0 16px}

/* ── modal (confirm + profile popup) ── */
.modal-bg{position:fixed;inset:0;z-index:50;background:rgba(74,64,99,.32);backdrop-filter:blur(8px) saturate(1.1);display:grid;place-items:center;padding:20px;animation:fade .25s ease}
.modal{width:100%;max-width:400px;border:1.5px solid rgba(255,255,255,.9);border-radius:var(--r-xl);padding:30px 26px;
  background:linear-gradient(180deg,#fff 0%,#FBF7FF 100%);box-shadow:0 30px 70px -26px rgba(124,115,150,.55),inset 0 1px 0 #fff;
  text-align:center;animation:popIn .4s var(--bounce) both}
.modal .mic,.pm-emoji{font-size:58px;line-height:1;filter:drop-shadow(0 8px 14px rgba(169,140,255,.35))}
.modal h3{font-family:var(--display);font-weight:600;font-size:23px;margin:14px 0 6px;color:var(--text)}
.modal p{font-family:var(--body);font-weight:600;color:var(--muted);font-size:14px;margin:0 0 22px;line-height:1.55}
.modal .row{display:flex;gap:12px;justify-content:center}
.modal .row button{flex:1;border-radius:var(--pill);padding:14px;font-family:var(--display);font-weight:600;font-size:15px;cursor:pointer;border:0;transition:transform .28s var(--bounce),filter .2s,box-shadow .2s,background .15s}
.modal .cancel{background:#F2EEFB;color:var(--muted)}
.modal .cancel:hover{background:#EAE3F7}
.modal .confirm{color:#fff;background:var(--candy);box-shadow:0 10px 22px -10px rgba(169,140,255,.65),inset 0 1px 0 rgba(255,255,255,.55)}
.modal .confirm:hover{transform:translateY(-2px) scale(1.02);filter:brightness(1.04);box-shadow:0 16px 32px -10px rgba(169,140,255,.72)}
.modal .confirm:active{transform:scale(.97)}

/* profile popup specifics */
.profile-modal{max-width:430px}
.profile-modal .form{display:grid;grid-template-columns:1fr;gap:15px;margin-bottom:22px;text-align:left}
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:800}
.field input{font-family:var(--body);font-weight:600;font-size:16px;color:var(--text);background:rgba(124,115,150,.06);border:1.5px solid rgba(124,115,150,.18);border-radius:16px;padding:13px 16px;outline:none;transition:border-color .15s,box-shadow .15s,background .15s}
.field input::placeholder{color:var(--muted-2)}
.field input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 4px rgba(169,140,255,.18)}
.field input.bad{border-color:var(--err);box-shadow:0 0 0 4px rgba(255,107,138,.16)}
.field .msg{font-size:12px;color:var(--err);min-height:14px;font-weight:700}
.profile-modal .row .confirm{flex:1.4}

/* toast */
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(24px);z-index:60;
  background:rgba(255,255,255,.92);backdrop-filter:blur(10px) saturate(1.2);border:1.5px solid rgba(255,255,255,.9);
  color:var(--text);font-family:var(--body);font-weight:700;font-size:14px;padding:14px 20px 16px;border-radius:var(--pill);
  box-shadow:0 18px 40px -16px rgba(124,115,150,.45),inset 0 1px 0 #fff;opacity:0;pointer-events:none;max-width:90vw;overflow:hidden;
  transition:opacity .3s ease,transform .35s var(--bounce)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.show::after{content:"";position:absolute;left:16px;right:16px;bottom:7px;height:3px;border-radius:var(--pill);background:linear-gradient(90deg,#A98CFF,#FFB3D1);transform-origin:left;animation:toastBar 2.4s linear forwards}

@keyframes rise{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:none}}
@keyframes wobble{0%{transform:rotate(0)}25%{transform:rotate(-7deg) scale(1.08)}55%{transform:rotate(6deg) scale(1.06)}100%{transform:rotate(0) scale(1)}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:translateY(18px) scale(.92)}to{opacity:1;transform:none}}
@keyframes toastBar{from{transform:scaleX(1)}to{transform:scaleX(0)}}

@media(max-width:560px){
  .wrap{padding:34px 16px 80px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
  .taken-grid{grid-template-columns:1fr}
}
@media(prefers-reduced-motion:reduce){
  .tile,.tile .ic,.cap-bar span,.full-team,.modal,.modal-bg,.toast,.toast.show::after{animation:none!important;transition:none!important}
  .tile.sel:hover{transform:none}
}
</style>

</head>

<script>const SCRIPT_URL = "";</script>

<script>
// ➊ Các trường người chơi nhập. Thêm trường thì thêm vào đây

<!-- Firebase SDK (compat) + cấu hình dự án. Tải qua CDN nên KHÔNG cần bước build/bundle. -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
// ⚠️ DÁN CẤU HÌNH FIREBASE CỦA BẠN VÀO ĐÂY
//    Firebase Console → ⚙ Project settings → mục "Your apps" → Web app → "SDK setup and configuration".
//    Để trống projectId thì app tự chạy ở chế độ sheet/demo (không dùng Firebase).
const FIREBASE_CONFIG = {

};

const FIREBASE_ON = !!(FIREBASE_CONFIG.projectId && window.firebase);

<script>
// Lưu trữ: ưu tiên window.storage (Claude artifact); nếu không có thì dùng localStorage
// để TOKEN định danh + đội đã tham gia NHỚ qua lần tải lại trang (không hiện lại popup).
// Nếu localStorage bị chặn (chế độ riêng tư) → fallback in-memory (mất khi tải lại).
const mem = {};
let LS_OK = false;
try { localStorage.setItem("__lt_probe", "1"); localStorage.removeItem("__lt_probe"); LS_OK = true; } catch (e) { LS_OK = false; }
const LS_PREFIX = "linhthu:";

async function sGet(key, shared) {
  try {
    if (REAL)  { const r = await window.storage.get(key, shared); return r ? r.value : null; }
    if (LS_OK) { const v = localStorage.getItem(LS_PREFIX + key); return v === null ? null : v; }
    return key in mem ? mem[key] : null;
  } catch (e) { return null; }
}

async function sSet(key, val, shared) {
  try {
    if (REAL)  { await window.storage.set(key, val, shared); return; }
    if (LS_OK) { localStorage.setItem(LS_PREFIX + key, val);  return; }
    mem[key] = val;
  } catch (e) {}
}

async function sDel(key, shared) {
  try {
    if (REAL)  { await window.storage.delete(key, shared);  return; }
    if (LS_OK) { localStorage.removeItem(LS_PREFIX + key);  return; }
    delete mem[key];
  } catch (e) {}
}
</script>

<script>
// ─────────────────────────────────────────────────────────────────────────
// Tầng dữ liệu — MÔ HÌNH ĐỘI (mỗi icon = 1 đội, tối đa CAPACITY người). 3 chế độ:
//   firebase → Firestore (chịu tải lớn, ghi atomic, đọc realtime)  ← khuyến nghị cho ~500 người
//   sheet    → Google Apps Script + Sheet (legacy, không hợp >50 người cùng lúc)
//   demo     → in-memory / window.storage (chạy thử cục bộ)
// Hợp đồng: apiState()→{ icon:{count,names[]} }; apiClaim()→{ok}|{ok:false,reason};
//           apiSubscribe(cb) (chỉ firebase) đẩy realtime, thay cho việc poll mỗi 3s.
// ─────────────────────────────────────────────────────────────────────────

// Mô hình Firestore (tách PII khỏi mọi doc đọc-được — xem firestore.rules):
//   teams/{icon}   : { icon, count, names:[...] }                  — CÔNG KHAI, chỉ TÊN (hiển thị realtime)
//   members/{pid}  : { icon, at }                                 — guard 1-người-1-đội (đọc 1 doc, CẤM liệt kê)
//   emails/{key}   : { at }                                       — guard chống trùng email (chỉ tồn-tại)
//   signups/{pid}  : { playerId, icon, name, email, phone, at }   — FULL hồ sơ, KHOÁ ĐỌC (xuất qua Console)
// Sĩ số tối đa được ép thêm ở Security Rules (count <= CAPACITY) nên client gian lận cũng không vượt được.

function _emailKey(e) { return String(e || "").trim().toLowerCase().replace(/\//g, "_"); }

async function apiState() {
  if (MODE === "firebase") {
    const snap  = await db.collection("teams").get();
    const teams = {};
    snap.forEach(d => { const v = d.data(); teams[v.icon] = { count: v.count || 0, names: v.names || [] }; });
    return teams;
  }
  if (MODE === "sheet") {
    const r = await fetch(SCRIPT_URL + "?action=state", { method: "GET" });
    const j = await r.json();
    return (j && j.teams) || {};
  }
  // demo: dựng map đội từ claims cục bộ ({ icon: [ {name,email,pid}, ... ] })
  const obj = JSON.parse(await sGet("claims", true) || "{}");
  const teams = {};
  Object.keys(obj).forEach(icon => {
    const arr = obj[icon] || [];
    teams[icon] = { count: arr.length, names: arr.map(m => m.name || "") };
  });
  return teams;
}

async function apiClaim(payload) {
  if (MODE === "firebase") {
    const icon  = String(payload.icon     || "").trim();
    const pid   = String(payload.playerId || "").trim();
    const f     = payload.fields || {};
    const name  = String(f.name  || "").trim();
    const email = String(f.email || "").trim().toLowerCase();
    if (!icon || !name) return { ok: false, reason: "missing" };
    try {
      return await db.runTransaction(async tx => {
        const teamRef   = db.collection("teams").doc(icon);
        const memberRef = db.collection("members").doc(pid);   // guard 1-người-1-đội (chỉ {icon})
        const signupRef = db.collection("signups").doc(pid);   // full hồ sơ — KHOÁ đọc
        const mailRef   = (BLOCK_DUP_EMAIL && email)
          ? db.collection("emails").doc(_emailKey(email)) : null; // guard chống trùng email

        // Firestore: mọi lệnh ĐỌC phải xong trước mọi lệnh GHI
        const [t, mb, ml] = await Promise.all([
          tx.get(teamRef), tx.get(memberRef), mailRef ? tx.get(mailRef) : Promise.resolve(null),
        ]);
        if (pid && mb.exists)  return { ok: false, reason: "already" };   // 1 người chỉ 1 đội
        if (ml && ml.exists)   return { ok: false, reason: "dup_email" };

        const count = t.exists ? (t.data().count || 0) : 0;
        const names = t.exists ? (t.data().names || []) : [];
        if (count >= CAPACITY) return { ok: false, reason: "full" };      // đội đã đủ người

        const at = firebase.firestore.FieldValue.serverTimestamp();
        tx.set(teamRef,   { icon, count: count + 1, names: names.concat(name) }, { merge: true });
        tx.set(memberRef, { icon, at });                                  // guard: chỉ tên đội (đọc được)
        if (mailRef) tx.set(mailRef, { at });                             // guard: chỉ tồn-tại
        tx.set(signupRef, { playerId: pid, icon, name, email, phone: String(f.phone || ""), at }); // PII (khoá đọc)
        return { ok: true };
      });
    } catch (e) { return { ok: false, reason: "error", detail: String(e) }; }
  }
  if (MODE === "sheet") {
    // text/plain tránh CORS preflight; Apps Script vẫn đọc được body JSON
    const r = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "claim", ...payload }),
    });
    return await r.json();
  }
  // demo: áp luật đội y như backend (1 token 1 đội, tối đa CAPACITY, chặn trùng email)
  const obj    = JSON.parse(await sGet("claims", true) || "{}");
  const fields = payload.fields || {};
  const email  = String(fields.email || "").trim().toLowerCase();
  for (const ic in obj) {
    for (const m of obj[ic]) {
      if (m.pid && m.pid === payload.playerId) return { ok: false, reason: "already" };
      if (email && String(m.email || "").toLowerCase() === email) return { ok: false, reason: "dup_email" };
    }
  }
  const arr = obj[payload.icon] || (obj[payload.icon] = []);
  if (arr.length >= CAPACITY) return { ok: false, reason: "full" };
  arr.push({ name: String(fields.name || ""), email, pid: payload.playerId });
  await sSet("claims", JSON.stringify(obj), true);
  return { ok: true };
}

// Realtime: server tự ĐẨY thay đổi của các đội cho mọi client → bỏ hẳn poll 3s (rẻ + tức thì).
// Mỗi đội = 1 doc nhỏ; 500 client cùng nghe vẫn nhẹ vì chỉ truyền phần thay đổi.
let _unsubTeams = null;
function apiSubscribe(onChange) {
  if (MODE !== "firebase") return null;       // sheet/demo vẫn dùng poll như cũ
  _unsubTeams = db.collection("teams").onSnapshot(
    snap => { const teams = {}; snap.forEach(d => { const v = d.data(); teams[v.icon] = { count: v.count || 0, names: v.names || [] }; }); onChange(teams); },
    _err => { /* mạng trục trặc → giữ state cũ; vòng poll dự phòng sẽ tự đồng bộ lại */ }
  );
  return () => { if (_unsubTeams) _unsubTeams(); };
}
</script>

<script>
const MODE    = (typeof FIREBASE_ON !== "undefined" && FIREBASE_ON) ? "firebase" : (SCRIPT_URL ? "sheet" : "demo");
const REAL    = !!(window.storage && typeof window.storage.get === "function");
const $       = id => document.getElementById(id);
const byEmoji = {};
ICONS.forEach(g => byEmoji[g.icon] = g);

// State cục bộ
let me      = { id: null, fields: {} };
let myIcon  = null;   // emoji mình đã chọn
let editing = false;
let state   = {};     // map đội { icon: { count, names } } từ server
let stateLoaded = false; // đã NHẬN được state thật từ server lần nào chưa (phân biệt "rỗng" với "chưa tải/lỗi mạng")
let busy    = false;
let lastSig = null;   // chữ ký dữ liệu — chỉ render lại khi đổi (chống nhấp nháy)

const initial      = s => (s || "?").trim().charAt(0).toUpperCase();
const firstName    = s => { const p = (s || "").trim().split(/\s+/); return p[p.length - 1] || s || ""; };
const profileComplete = () => FIELDS.every(f => !f.required || (me.fields[f.key] || "").trim());
const esc = s => (s || "").replace(/[&<>"]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[c]));

let toastTimer;
function toast(msg) {
  const el = $("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2400);
}

function validEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test((v || "").trim()); }
function validPhone(v) { const d = (v || "").replace(/[^\d]/g, ""); return d.length >= 8 && d.length <= 15; }
function fieldError(f, v) {
  v = (v || "").trim();
  if (f.required && !v) return "Bắt buộc nhập";
  if (!v) return "";
  if (f.type === "email" && !validEmail(v)) return "Email không hợp lệ";
  if (f.type === "tel"   && !validPhone(v)) return "SĐT không hợp lệ (8–15 số)";
  return "";
}
</script>

<script>
// ── Hồ sơ người chơi ───────────────────────────────────────────────
// Đã có thông tin hợp lệ → thanh tóm tắt inline. Chưa có (token mới) → popup, không cho bỏ qua.
function renderProfile() {
  const box  = $("profile");
  const done = profileComplete() && !editing;

  if (done) {
    closeProfileModal();
    const metaBits = FIELDS.filter(f => f.key !== "name").map(f => me.fields[f.key]).filter(Boolean).join("  ·  ");
    box.innerHTML = `
      <div class="summary">
        <div class="ava" style="background:${myIcon ? byEmoji[myIcon].color : 'var(--accent)'}">${initial(me.fields.name)}</div>
        <div class="s-txt">
          <span class="nm">${esc(me.fields.name) || "Người chơi"}</span>
          <span class="meta">${esc(metaBits)}</span>
        </div>
        <div class="s-spacer"></div>
        ${myIcon ? "" : `<button class="linkbtn" id="editBtn">Sửa thông tin</button>`}
      </div>`;
    const eb = $("editBtn");
    if (eb) eb.onclick = () => { editing = true; renderProfile(); };
    return;
  }

  box.innerHTML = "";        // không còn form inline — dùng popup bên dưới
  showProfileModal();
}

function closeProfileModal() {
  const m = $("profileModal");
  if (m) m.remove();
}

// Popup nhập thông tin. canCancel = đang SỬA thông tin đã hợp lệ (cho phép quay lại);
// với token mới (chưa hợp lệ) thì KHÔNG có nút huỷ và KHÔNG đóng bằng click nền/Esc.
function showProfileModal() {
  if ($("profileModal")) return;          // tránh mở chồng
  const canCancel = profileComplete();

  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.id = "profileModal";
  bg.innerHTML = `
    <div class="modal profile-modal">
      <div class="pm-emoji">🐾</div>
      <h3>Chào bạn!</h3>
      <p>Điền một chút thông tin để bắt đầu tham gia đội của bạn nhé.</p>
      <div class="form" id="pmForm">
        ${FIELDS.map(f => `
          <div class="field ${f.type === "email" || f.type === "tel" ? "" : "full"}">
            <label>${esc(f.label)}${f.required ? " *" : ""}</label>
            <input id="f_${f.key}" type="${f.type}" placeholder="${esc(f.placeholder || "")}"
                   value="${esc(me.fields[f.key] || "")}" autocomplete="off"
                   inputmode="${f.type === "tel" ? "tel" : f.type === "email" ? "email" : "text"}">
            <span class="msg" id="m_${f.key}"></span>
          </div>`).join("")}
      </div>
      <div class="row">
        ${canCancel ? `<button class="cancel" id="pmCancel">Quay lại</button>` : ""}
        <button class="confirm" id="pmSave">Bắt đầu tham gia đội →</button>
      </div>
    </div>`;
  document.body.appendChild(bg);

  const save = async () => {
    let ok = true;
    FIELDS.forEach(f => {
      const inp = $("f_" + f.key), msg = $("m_" + f.key);
      const err = fieldError(f, inp.value);
      msg.textContent = err;
      inp.classList.toggle("bad", !!err);
      if (err) ok = false;
    });
    if (!ok) return;
    FIELDS.forEach(f => me.fields[f.key] = $("f_" + f.key).value.trim());
    editing = false;
    await saveMe();
    closeProfileModal();
    renderProfile();
    renderStateIfChanged(true);
    toast("Đã lưu thông tin. Giờ hãy chọn 1 đội để tham gia 👇");
  };

  $("pmSave").onclick = save;
  if (canCancel) $("pmCancel").onclick = () => { editing = false; closeProfileModal(); renderProfile(); };
  // CHỦ ĐÍCH: không gắn sự kiện click nền / Esc → popup không thể bỏ qua khi chưa hợp lệ.

  FIELDS.forEach(f => {
    const inp = $("f_" + f.key);
    inp.addEventListener("keydown", e => { if (e.key === "Enter") save(); });
    inp.addEventListener("input",   () => { $("m_" + f.key).textContent = ""; inp.classList.remove("bad"); });
  });
  const first = $("f_" + FIELDS[0].key);
  if (first) setTimeout(() => first.focus(), 40);
}

// ── Bảng đội (vẽ lại mỗi khi dữ liệu đổi) ──────────────────────────
function teamOf(icon) { return state[icon] || { count: 0, names: [] }; }

function renderState() {
  // myIcon còn hợp lệ? Chỉ mở khoá khi ĐÃ tải được state thật từ server và đội đó thực sự rỗng
  // (tránh xoá nhầm khi state chưa tải xong / fetch lỗi lúc mới vào trang).
  if (stateLoaded && myIcon && teamOf(myIcon).count === 0) { myIcon = null; saveMe(); renderProfile(); }

  // banner đội của mình
  const bw = $("bannerWrap");
  if (myIcon) {
    const g = byEmoji[myIcon];
    bw.innerHTML = `<div class="banner" style="--c:${g.color}">
        <span class="bi">${g.icon}</span>
        <div>
          <div class="bt">Bạn đang ở đội ${g.name} ${g.icon}</div>
          <div class="bs">Đã ghi nhận thông tin của bạn. Mỗi người chỉ tham gia 1 đội.</div>
        </div></div>`;
  } else {
    bw.innerHTML = "";
  }

  const ready = profileComplete() && !editing;

  // ── Đội còn chỗ (count < CAPACITY) ──
  const grid = $("grid"); grid.innerHTML = "";
  let open = 0;
  ICONS.forEach(g => {
    const tm = teamOf(g.icon);
    if (tm.count >= CAPACITY) return;        // đủ người → biến mất khỏi lưới này
    open++;
    const mine    = g.icon === myIcon;
    const canJoin = ready && !myIcon;        // chưa có đội mới được tham gia
    const pct     = Math.round(tm.count / CAPACITY * 100);
    const avas    = tm.names.slice(0, 5).map(n => `<span class="mini">${esc(initial(n))}</span>`).join("")
                  + (tm.count > 5 ? `<span class="mini more">+${tm.count - 5}</span>` : "")
                  || `<span class="mini empty">·</span>`;
    const label   = !ready ? "Điền thông tin" : (myIcon ? (mine ? "Đội của bạn" : "Đã có đội") : "Tham gia");

    const t = document.createElement("div");
    t.className = "tile " + (canJoin ? "sel" : "disabled") + (mine ? " mine" : "");
    t.style.setProperty("--c", g.color);
    t.innerHTML = `
      <div class="ic">${g.icon}</div>
      <div class="nm">${g.name}</div>
      <div class="cap">${tm.count}/${CAPACITY}</div>
      <div class="cap-bar"><span style="width:${pct}%"></span></div>
      <div class="avas">${avas}</div>
      <button class="pick ${canJoin ? "" : "lock"}">${label}</button>`;
    if (canJoin) {
      const act = () => askConfirm(g);
      t.onclick = e => { if (!e.target.closest("button")) act(); };
      t.querySelector(".pick").onclick = e => { e.stopPropagation(); act(); };
    }
    grid.appendChild(t);
  });
  $("freeCount").textContent = `${open}/${ICONS.length} đội`;
  $("freeHint").innerHTML    = (!profileComplete() && open > 0) ? `<div class="hint">→ Điền thông tin để mở khoá việc tham gia đội.</div>` : "";
  $("freeEmpty").innerHTML   = open === 0 ? `<div class="empty-note">Tất cả các đội đều đã đủ người 🎉</div>` : "";

  // ── Đội đã đủ (count >= CAPACITY) — liệt kê đủ thành viên ──
  const tk = $("taken"); tk.innerHTML = "";
  let done = 0;
  ICONS.forEach(g => {
    const tm = teamOf(g.icon);
    if (tm.count < CAPACITY) return;
    done++;
    const mine = g.icon === myIcon;
    const lis  = tm.names.map((n, i) => `<li><span class="no">${i + 1}</span>${esc(n || "—")}</li>`).join("");
    const el = document.createElement("div");
    el.className = "full-team" + (mine ? " mine" : "");
    el.style.setProperty("--c", g.color);
    el.innerHTML = `
      <div class="ft-head">
        <span class="ti">${g.icon}</span>
        <div class="ft-meta"><div class="lab">Đội</div><div class="ft-name">${g.name}</div></div>
        <span class="ft-badge">${tm.count}/${CAPACITY}${mine ? " · bạn" : ""}</span>
      </div>
      <ol class="ft-list">${lis}</ol>`;
    tk.appendChild(el);
  });
  $("takenCount").textContent = `${done}/${ICONS.length} đội`;
  $("takenEmpty").innerHTML   = done === 0 ? `<div class="empty-note">Chưa có đội nào đủ ${CAPACITY} người. Cùng rủ thêm bạn nào!</div>` : "";
}
</script>

<script>
function askConfirm(g) {
  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.innerHTML = `<div class="modal" style="--c:${g.color}">
      <div class="mic">${g.icon}</div>
      <h3>Tham gia đội ${esc(g.name)}?</h3>
      <p>Mỗi người chỉ tham gia 1 đội (tối đa ${CAPACITY} người/đội). Xác nhận xong sẽ ghi nhận thông tin của bạn.</p>
      <div class="row">
        <button class="cancel"  id="c0">Quay lại</button>
        <button class="confirm" id="c1">Xác nhận</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
  bg.querySelector("#c0").onclick   = () => bg.remove();
  bg.addEventListener("click", e => { if (e.target === bg) bg.remove(); });
  bg.querySelector("#c1").onclick   = async () => { bg.remove(); await doClaim(g); };
}

async function doClaim(g) {
  if (busy) return;
  busy = true;
  try {
    const res = await apiClaim({ icon: g.icon, playerId: me.id, fields: me.fields });
    if (res && res.ok) {
      myIcon = g.icon;
      await saveMe();
      toast(`🎉 Bạn đã tham gia đội ${g.name} ${g.icon}`);
    } else {
      const r = res && res.reason;
      if      (r === "full")      toast(`Đội ${g.name} vừa đủ ${CAPACITY} người rồi!`);
      else if (r === "already")   toast("Bạn đã tham gia một đội rồi.");
      else if (r === "dup_email") toast("Email này đã được dùng để tham gia rồi.");
      else                        toast("Không tham gia được, thử lại nhé.");
    }
    await refresh(true);
    renderProfile();
  } catch (err) {
    // mạng trục trặc — kiểm tra lại bằng poll
    toast("Đang kiểm tra kết quả…");
    await refresh(true);
  } finally {
    busy = false;
  }
}

// Chữ ký dữ liệu: chỉ render lại khi sĩ số/tên đội/myIcon/editing/hồ-sơ thực sự đổi → chống nhấp nháy
function computeSig() {
  const t = Object.keys(state).sort()
    .map(ic => ic + ":" + state[ic].count + ":" + (state[ic].names || []).join(","))
    .join("|");
  return t + "||" + (myIcon || "") + "|" + (editing ? 1 : 0) + "|" + (profileComplete() ? 1 : 0) + "|" + (stateLoaded ? 1 : 0);
}
function renderStateIfChanged(force) {
  const sig = computeSig();
  if (force || sig !== lastSig) { lastSig = sig; renderState(); }
}

async function refresh(force) {
  // fetch lỗi (mạng chập chờn / Apps Script khởi động nguội) → GIỮ NGUYÊN state lần trước,
  // KHÔNG coi là rỗng → tránh xoá nhầm đội đã tham gia khi tải lại trang.
  try { state = await apiState(); stateLoaded = true; } catch (e) { /* giữ state cũ */ }
  renderStateIfChanged(force);
}

async function loadMe() {
  try {
    const raw = await sGet("me", false);
    if (raw) { const o = JSON.parse(raw); me = o.me || me; myIcon = o.myIcon || null; }
  } catch (e) {}
}

async function saveMe() {
  await sSet("me", JSON.stringify({ me, myIcon }), false);
}

(async function init() {
  await loadMe();
  // token định danh: tạo 1 lần, lưu localStorage → nhớ qua các lần tải lại trang
  if (!me.id) { me.id = "u" + Math.random().toString(36).slice(2, 10); me.fields = me.fields || {}; await saveMe(); }

  renderProfile();         // token mới → bật popup; đã có thông tin → tóm tắt / banner đội
  await refresh(true);
  if (MODE === "firebase" && typeof apiSubscribe === "function") {
    // realtime: server tự ĐẨY thay đổi của các đội → KHÔNG poll. onSnapshot tự kết nối lại
    // và đồng bộ khi online trở lại, nên rẻ nhất mà vẫn tức thì.
    apiSubscribe(teams => { if (busy) return; state = teams; stateLoaded = true; renderStateIfChanged(false); });
  } else {
    setInterval(() => { if (!busy) refresh(); }, POLL_MS); // poll ngầm 3s (sheet/demo)
  }
})();
</script>
