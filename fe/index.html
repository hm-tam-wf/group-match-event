<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Group Match</title>
<meta name="description" content="Group Match — Thành lập đội: mỗi icon là 1 đội, mỗi người chỉ vào 1 đội." />
<meta property="og:title" content="Group Match" />
<meta property="og:description" content="Thành lập đội — mỗi icon là 1 đội, mỗi người chỉ vào 1 đội." />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="Group Match" />
<meta name="twitter:description" content="Thành lập đội — mỗi icon là 1 đội, mỗi người chỉ vào 1 đội." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<!-- Base/registry của lớp theme (token default ở styles.css; recipe thêm theme ở file này). -->
<link rel="stylesheet" href="assets/themes.css">
<!-- Theme 'tech' (gói trong fe/themes/tech/) — nạp SAU themes.css để [data-theme] thắng cascade. -->
<link rel="stylesheet" href="themes/tech/tech.css">
<!-- Addon tùy biến của tech: icon đội = chip cyan (nạp SAU tech.css để đè .ic/.bi; index-only). -->
<link rel="stylesheet" href="themes/tech/chip.css">
<!-- Áp theme TRƯỚC khi vẽ (0 FOUC). Nguồn sự thật DUY NHẤT: ACTIVE_THEME trong theme.js. -->
<script src="js/config/theme.js"></script>
<style>
  .boot-msg { text-align:center; padding:64px 16px; color:#6b7790; font-size:16px; }
  .boot-msg b { color:#1f2a44; }
</style>
</head>
<body class="initial-load">
<div class="wrap">

  <!-- Trạng thái khởi động (chỉ hiện ở chế độ firebase, biến mất sau khi tải config xong) -->
  <div id="appLoading" class="boot-msg">Loading event…</div>
  <div id="noEvent"    class="boot-msg" hidden><b>No event is open right now.</b><br>Please check back later.</div>
  <div id="appError"   class="boot-msg" hidden></div>

  <!-- Nội dung chính — bị ẩn cho đến khi boot() nạp xong config -->
  <div id="appContent" hidden>
    <div class="tech-logo-only">
      <div class="logo-wrap">
        <img src="themes/tech/img/logo-faraday.png" alt="Faraday Icon" class="logo-icon">
        <span class="logo-text">FARADAY</span>
      </div>
    </div>
    <h1>Group Match</h1>
    <p class="sub">Mỗi icon là <b>1 đội</b> (tối đa <b>10 thành viên</b>). Điền thông tin rồi tham gia đội bạn thích — đội đủ 10 người sẽ <b>chốt danh sách</b>. Mỗi người chỉ vào được <b>1 đội</b>.</p>

    <!-- hồ sơ -->
    <div class="profile" id="profile"></div>

    <!-- banner đội của bạn -->
    <div id="bannerWrap"></div>

    <!-- đội còn chỗ -->
    <div class="section-h">
      <h2 id="freeHead">Teams with Open Spots</h2>
      <span class="count" id="freeCount"></span>
      <span class="hr"></span>
    </div>
    <div id="freeHint"></div>
    <div class="grid" id="grid"></div>
    <div id="freeEmpty"></div>

    <!-- đội đã đủ -->
    <div class="section-h">
      <h2 id="takenHead">Full Teams</h2>
      <span class="count" id="takenCount"></span>
      <span class="hr"></span>
    </div>
    <div class="taken-grid" id="taken"></div>
    <div id="takenEmpty"></div>
  </div>

</div>

<div id="toast" class="toast"></div>

<!-- Firebase SDK (compat) qua CDN — KHÔNG cần bước build/bundle. Phải nạp TRƯỚC js/firebase-config.js. -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Nạp ĐÚNG THỨ TỰ phụ thuộc biến toàn cục (script thường, KHÔNG type=module):
     config → [themes/tech/strings] → firebase-config → storage → api → ui-utils → ui-render → app -->
<script src="js/config/config.js"></script>
<!-- Text riêng-theo-theme (terminal boot của theme `tech`, gói trong fe/themes/tech/) — merge vào STRINGS, phải nạp SAU config.js. -->
<script src="themes/tech/strings.js"></script>
<script src="js/config/firebase-config.js"></script>
<script src="js/data/storage.js"></script>
<script src="js/data/api.js"></script>
<script src="js/ui/ui-utils.js"></script>
<script src="js/ui/ui-render.js"></script>
<script src="js/app.js"></script>
<!-- Hoạt ảnh canvas riêng theme `tech` (gói trong fe/themes/tech/) — IIFE độc lập, nạp CUỐI body. -->
<script src="themes/tech/circuit.js"></script>
</body>
</html>
